apiVersion: v1
kind: Service
metadata:
  name: inventory-db
spec:
  ports:
    - port: 5432
  selector:
    app: inventory-db
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: inventory-db
spec:
  serviceName: inventory-db
  replicas: 1
  selector:
    matchLabels:
      app: inventory-db
  template:
    metadata:
      labels:
        app: inventory-db
    spec:
      containers:
      - name: db
        image: 361990119373.dkr.ecr.eu-north-1.amazonaws.com/inventory-db:latest
        env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: mypassword
        - name: POSTGRES_DB
          value: movies_db
        ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: billing-db
spec:
  ports:
    - port: 5432
  selector:
    app: billing-db
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: billing-db
spec:
  serviceName: billing-db
  replicas: 1
  selector:
    matchLabels:
      app: billing-db
