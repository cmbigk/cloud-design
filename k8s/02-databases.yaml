---
apiVersion: v1
kind: Service
metadata:
  name: rabbit-queue
spec:
  ports:
    - port: 5672
  selector:
    app: rabbit-queue
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbit-queue
spec:
  serviceName: rabbit-queue
  replicas: 1
  selector:
    matchLabels:
      app: rabbit-queue
  template:
    metadata:
      labels:
        app: rabbit-queue
    spec:
      containers:
      - name: rabbitmq
        image: 361990119373.dkr.ecr.eu-north-1.amazonaws.com/rabbit-queue:latest
        env:
        - name: RABBITMQ_DEFAULT_USER
          value: guest
        - name: RABBITMQ_DEFAULT_PASS
          value: guest
        ports:
        - containerPort: 5672
